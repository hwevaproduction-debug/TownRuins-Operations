name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for git-based created/modified dates
          submodules: recursive # content/ → public TownRuins-Docs submodule
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Cache Quartz plugins
        uses: actions/cache@v5
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-
      - name: Install Dependencies
        run: npm ci
      # Invoke via node — avoids "quartz: Permission denied" when the bin
      # shim / bootstrap-cli.mjs is not marked executable on the runner.
      - name: Install Quartz plugins
        run: node ./quartz/bootstrap-cli.mjs plugin install
      - name: Build Quartz
        run: node ./quartz/bootstrap-cli.mjs build
      # Durable hub-collision gate (content absolute hubs + data-slug asserts).
      # Do not gate on full check:links (monorepo source maps fail inventory).
      - name: Assert hub data-slugs
        run: npm run check:hub-slugs
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
